name: Build DSpico

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      WRFU_TESTER_B64: ${{ secrets.WRFU_TESTER_B64 }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Initialize submodules
        run: |
          git submodule update --init dspico-dldi
          git submodule update --init dspico-bootloader
          git submodule update --init DSRomEncryptor
          git submodule update --init dspico-wrfuxxed
          git submodule update --init dspico-firmware
          git submodule update --init pico-loader
          git submodule update --init pico-launcher

          git -C dspico-bootloader submodule update --init
          git -C pico-loader       submodule update --init
          git -C pico-launcher     submodule update --init

          git -C dspico-firmware submodule update --init
          git -C dspico-firmware/pico-sdk submodule update --init

      - name: Install BlocksDS (via Docker image extraction)
        run: |
          docker image pull skylyrac/blocksds:slim-latest
          docker create --name blocksds-extract skylyrac/blocksds:slim-latest
          sudo docker cp blocksds-extract:/opt/wonderful /opt/wonderful
          docker rm blocksds-extract
          echo "/opt/wonderful/bin" >> $GITHUB_PATH
          echo "BLOCKSDS=/opt/wonderful/thirdparty/blocksds/core" >> $GITHUB_ENV
          echo "BLOCKSDSEXT=/opt/wonderful/thirdparty/blocksds/external" >> $GITHUB_ENV
          echo "DLDITOOL=/opt/wonderful/thirdparty/blocksds/core/tools/dlditool/dlditool" >> $GITHUB_ENV

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc-arm-none-eabi build-essential git

      - name: Set up .NET 9.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Build DSpico DLDI
        run: make -C dspico-dldi

      - name: Build DSpico Bootloader
        run: make -C dspico-bootloader

      - name: DLDI-patch Bootloader
        run: |
          "$DLDITOOL" dspico-dldi/DSpico.dldi dspico-bootloader/BOOTLOADER.nds

      - name: Build DSRomEncryptor
        run: dotnet build --configuration Debug DSRomEncryptor/DSRomEncryptor.sln

      - name: Decode blowfish tables
        env:
          NTR_BLOWFISH_B64: ${{ secrets.NTR_BLOWFISH_B64 }}
          TWL_BLOWFISH_B64: ${{ secrets.TWL_BLOWFISH_B64 }}
        run: |
          ENCDIR="DSRomEncryptor/DSRomEncryptor/bin/Debug/net9.0"
          echo "$NTR_BLOWFISH_B64" | base64 -d | gunzip > "$ENCDIR/biosnds7.rom"
          echo "$TWL_BLOWFISH_B64" | base64 -d | gunzip > "$ENCDIR/biosdsi7.rom"

      - name: Encrypt Bootloader → default.nds
        run: |
          ENCDIR="DSRomEncryptor/DSRomEncryptor/bin/Debug/net9.0"
          dotnet "$ENCDIR/DSRomEncryptor.dll" \
            dspico-bootloader/BOOTLOADER.nds \
            default.nds

      - name: Build Wrfuxxed
        if: ${{ env.WRFU_TESTER_B64 != '' }}
        run: make -C dspico-wrfuxxed

      - name: DLDI-patch Wrfuxxed
        if: ${{ env.WRFU_TESTER_B64 != '' }}
        run: |
          "$DLDITOOL" dspico-dldi/DSpico.dldi dspico-wrfuxxed/uartBufv060.bin

      - name: Prepare firmware ROM assets
        run: |
          cp default.nds dspico-firmware/roms/default.nds

          if [ -n "$WRFU_TESTER_B64" ]; then
            echo "$WRFU_TESTER_B64" | base64 -d > dspico-firmware/roms/dsimode.nds
            cp dspico-wrfuxxed/uartBufv060.bin dspico-firmware/data/uartBufv060.bin
            sed -i 's/#\s*set(DSPICO_ENABLE_WRFUXXED/set(DSPICO_ENABLE_WRFUXXED/' dspico-firmware/CMakeLists.txt
          fi

      - name: Compile DSpico Firmware
        run: |
          cd dspico-firmware
          chmod +x compile.sh
          ./compile.sh

      - name: Build Pico Loader
        run: make -C pico-loader

      - name: Build Pico Launcher
        run: make -C pico-launcher

      - name: Collect release artifacts
        run: |
          mkdir -p dist
          cp dspico-firmware/build/DSpico.uf2  dist/DSpico.uf2
          if [ -f dspico-wrfuxxed/uartBufv060.bin ]; then
            cp dspico-wrfuxxed/uartBufv060.bin dist/uartBufv060.bin
          fi

          mkdir -p sd/_pico
          cp pico-launcher/LAUNCHER.nds              sd/_picoboot.nds
          cp pico-loader/picoLoader7.bin             sd/_pico/picoLoader7.bin
          cp pico-loader/picoLoader9_DSPICO.bin      sd/_pico/picoLoader9.bin
          cp pico-loader/data/aplist.bin             sd/_pico/aplist.bin
          cp pico-loader/data/savelist.bin           sd/_pico/savelist.bin
          cp -r pico-launcher/_pico/themes           sd/_pico/themes

          cd sd && zip -r ../dist/sd-card.zip . && cd ..

          echo "=== Release artifacts ==="
          find dist -type f | sort

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/sd-card.zip
            dist/DSpico.uf2

      - name: Upload Wrfuxxed artifact
        if: ${{ env.WRFU_TESTER_B64 != '' }}
        uses: softprops/action-gh-release@v2
        with:
          files: dist/uartBufv060.bin
